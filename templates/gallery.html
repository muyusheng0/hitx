<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相册 - 吉大自动化八班</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>📖</text></svg>">
</head>
<body>
    <!-- 顶部标题栏 -->
    <header class="top-header">
        <h1 class="header-title">吉大<span>自动化</span>八班</h1>
        <div id="userStatus" class="user-status"></div>
    </header>

    <!-- 主内容 -->
    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">📷 青春相册</h1>
                <p class="page-subtitle">记录美好瞬间，定格永恒回忆</p>
            </div>

            <!-- 上传区域 -->
            <div class="upload-zone" onclick="showUploadModal()">
                <div class="upload-zone-icon">📤</div>
                <div class="upload-zone-text">点击上传照片（需验证身份）</div>
            </div>

            <!-- 相册网格 -->
            <div class="gallery-grid">
                {% if images %}
                {% for img in images %}
                <div class="gallery-item" onclick="showLightbox('{{ img.url }}')">
                    <img src="{{ img.url }}" alt="{{ img.name }}">
                    <div class="gallery-overlay">{{ img.name }}</div>
                </div>
                {% endfor %}
                {% else %}
                <div class="empty-message" style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                    <p style="font-size: 3rem; margin-bottom: 1rem;">📷</p>
                    <p>还没有上传照片，快来分享你的第一张吧~</p>
                </div>
                {% endif %}
            </div>
        </div>
    </main>

    <!-- 底部标签栏（微信小程序风格） -->
    <nav class="bottom-tab-bar">
        <a href="/" class="tab-item">
            <span class="tab-icon">🏠</span>
            <span class="tab-label">首页</span>
        </a>
        <a href="/txl" class="tab-item">
            <span class="tab-icon">👥</span>
            <span class="tab-label">通讯录</span>
        </a>
        <a href="/lyb" class="tab-item">
            <span class="tab-icon">💬</span>
            <span class="tab-label">留言板</span>
        </a>
        <a href="/gallery" class="tab-item active">
            <span class="tab-icon">📷</span>
            <span class="tab-label">相册</span>
        </a>
        <a href="/video" class="tab-item">
            <span class="tab-icon">🎬</span>
            <span class="tab-label">视频</span>
        </a>
        <a href="/about" class="tab-item">
            <span class="tab-icon">ℹ️</span>
            <span class="tab-label">关于</span>
        </a>
    </nav>

    <!-- 灯箱 -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        <img id="lightboxImg" src="" alt="">
    </div>

    <!-- 验证模态框 -->
    <div class="modal-overlay" id="verifyModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">身份验证</h3>
                <button class="modal-close" onclick="closeVerifyModal()">✕</button>
            </div>
            <form class="verify-form" onsubmit="submitVerify(event)">
                <div class="input-group">
                    <label>姓名</label>
                    <input type="text" id="verifyName" onblur="checkPasswordRequired()" placeholder="请输入你的姓名" required>
                </div>
                <div class="input-group">
                    <label>学号</label>
                    <input type="text" id="verifyStudentId" onblur="checkPasswordRequired()" placeholder="请输入你的学号" required>
                </div>
                <div class="input-group">
                    <label>验证码</label>
                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                        <span id="captchaQuestion" style="font-size: 1.2rem; font-weight: bold; color: var(--secondary); min-width: 60px;">加载中...</span>
                        <input type="text" id="verifyCaptcha" placeholder="请输入答案" required style="flex: 1;">
                        <button type="button" onclick="refreshCaptcha()" style="background: none; border: none; cursor: pointer; font-size: 1.2rem;" title="刷新验证码">🔄</button>
                    </div>
                </div>
                <div class="input-group" id="loginPasswordGroup" style="display: none;">
                    <label>登录密码</label>
                    <input type="password" id="verifyLoginPassword" placeholder="请输入登录密码">
                </div>
                <div class="verify-error" id="verifyError"></div>
                <button type="submit" class="verify-btn">验证身份</button>
            </form>
        </div>
    </div>

    <!-- 上传模态框 -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">上传照片</h3>
                <button class="modal-close" onclick="closeUploadModal()">✕</button>
            </div>
            <div style="text-align: center; padding: 2rem 0;">
                <input type="file" id="fileInput" accept="image/*" onchange="handleImageUpload(this.files[0])"
                       style="display: none;">
                <label for="fileInput" style="cursor: pointer;">
                    <div style="border: 2px dashed var(--bg-dark); border-radius: 16px; padding: 3rem; transition: all 0.3s ease;"
                         onmouseover="this.style.borderColor='var(--secondary)'; this.style.background='rgba(231,76,60,0.05)'"
                         onmouseout="this.style.borderColor='var(--bg-dark)'; this.style.background='transparent'">
                        <div style="font-size: 3rem; margin-bottom: 1rem;">📷</div>
                        <p>点击选择图片</p>
                        <p style="font-size: 0.85rem; color: var(--text-light); margin-top: 0.5rem;">支持 JPG、PNG、GIF，最大 10MB</p>
                    </div>
                </label>
                <div id="uploadProgress" class="upload-progress" style="display: none; margin-top: 1rem; text-align: left;">
                    <div class="upload-progress-bar" style="width: 0%;"></div>
                    <span class="upload-progress-text">0%</span>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
