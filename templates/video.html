<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频 - 吉大自动化八班</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/film-grain.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>📖</text></svg>">
<div class="film-grain-overlay"></div>
</head>
<body>
    <!-- 顶部标题栏 -->
    <header class="top-header">
        <h1 class="header-title">吉大<span>自动化</span>八班</h1>
        <div id="userStatus" class="user-status"></div>
    </header>

    <!-- 主内容 -->
    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">🎬 影像回忆</h1>
                <p class="page-subtitle">珍藏视频，记录青春</p>
            </div>

            <!-- 添加视频 -->
            <div class="add-video-form">
                <button class="submit-btn" onclick="showAddVideoModal()" style="margin: 0 auto;">
                    <span>➕</span> 添加视频链接
                </button>
            </div>

            <!-- 视频网格 -->
            <div class="video-grid">
                {% for video in videos %}
                <div class="video-card">
                    <div class="video-placeholder" onclick="showVideoModal('{{ video.url }}', '{{ video.title }}')">
                        <div class="video-play-icon">▶</div>
                    </div>
                    <div class="video-info">
                        <div class="video-title">{{ video.title }}</div>
                        <a href="{{ video.url }}" target="_blank" class="video-link">{{ video.url|truncate(50) }}</a>
                    </div>
                </div>
                {% else %}
                <div class="empty-message" style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                    <p style="font-size: 3rem; margin-bottom: 1rem;">🎬</p>
                    <p>还没有视频，快来分享第一个吧~</p>
                </div>
                {% endfor %}
            </div>
        </div>
    </main>

    <!-- 底部标签栏（微信小程序风格） -->
    <nav class="bottom-tab-bar">
        <a href="/" class="tab-item">
            <span class="tab-icon">🏠</span>
            <span class="tab-label">首页</span>
        </a>
        <a href="/txl" class="tab-item">
            <span class="tab-icon">👥</span>
            <span class="tab-label">通讯录</span>
        </a>
        <a href="/lyb" class="tab-item">
            <span class="tab-icon">💬</span>
            <span class="tab-label">留言板</span>
        </a>
        <a href="/media" class="tab-item active">
            <span class="tab-icon">📷</span>
            <span class="tab-label">媒体</span>
        </a>
        <a href="/about" class="tab-item">
            <span class="tab-icon">👤</span>
            <span class="tab-label">我的</span>
        </a>
    </nav>

    <!-- 视频模态框 -->
    <div class="video-modal" id="videoModal">
        <button class="video-modal-close" onclick="closeVideoModal()">✕</button>
        <div class="video-modal-content">
            <iframe allowfullscreen></iframe>
        </div>
    </div>

    <!-- 验证模态框 -->
    <div class="modal-overlay" id="verifyModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">身份验证</h3>
                <button class="modal-close" onclick="closeVerifyModal()">✕</button>
            </div>
            <form class="verify-form" onsubmit="submitVerify(event)">
                <div class="input-group">
                    <label>姓名</label>
                    <input type="text" id="verifyName" onblur="checkPasswordRequired()" placeholder="请输入你的姓名" required>
                </div>
                <div class="input-group">
                    <label>学号</label>
                    <input type="text" id="verifyStudentId" onblur="checkPasswordRequired()" placeholder="请输入你的学号" required>
                </div>
                <div class="input-group">
                    <label>验证码</label>
                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                        <span id="captchaQuestion" style="font-size: 1.2rem; font-weight: bold; color: var(--secondary); min-width: 60px;">加载中...</span>
                        <input type="text" id="verifyCaptcha" placeholder="请输入答案" required style="flex: 1;">
                        <button type="button" onclick="refreshCaptcha()" style="background: none; border: none; cursor: pointer; font-size: 1.2rem;" title="刷新验证码">🔄</button>
                    </div>
                </div>
                <div class="input-group" id="loginPasswordGroup" style="display: none;">
                    <label>登录密码</label>
                    <input type="password" id="verifyLoginPassword" placeholder="请输入登录密码">
                </div>
                <div class="verify-error" id="verifyError"></div>
                <button type="submit" class="verify-btn">验证身份</button>
            </form>
        </div>
    </div>

    <!-- 添加视频模态框 -->
    <div class="modal-overlay" id="addVideoModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">添加视频</h3>
                <button class="modal-close" onclick="closeAddVideoModal()">✕</button>
            </div>
            <form class="edit-form" onsubmit="submitVideo(event)">
                <div class="input-group">
                    <label>视频标题</label>
                    <input type="text" id="videoTitle" placeholder="给视频起个标题" required>
                </div>
                <div class="input-group">
                    <label>视频链接</label>
                    <input type="url" id="videoUrl" placeholder="粘贴第三方视频链接或本地路径" required>
                </div>
                <button type="submit" class="verify-btn" style="margin-top: 1rem;">添加</button>
            </form>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
