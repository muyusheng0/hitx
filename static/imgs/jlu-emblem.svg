<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 吉林大学校徽 SVG -->
  <!-- 外圆 -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#c9a96e" stroke-width="3"/>
  <!-- 内圆装饰 -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#c9a96e" stroke-width="1.5" opacity="0.6"/>
  
  <!-- 校名 - 上方 -->
  <text x="100" y="60" text-anchor="middle" fill="#c9a96e" font-size="18" font-family="serif" font-weight="bold">吉林大学</text>
  
  <!-- 英文名 - 下方 -->
  <text x="100" y="160" text-anchor="middle" fill="#c9a96e" font-size="12" font-family="Arial" letter-spacing="2">JILIN UNIVERSITY</text>
  
  <!-- 建校年份 -->
  <text x="100" y="140" text-anchor="middle" fill="#c9a96e" font-size="10" font-family="Arial" opacity="0.7">1946</text>
  
  <!-- 中央图案 - 书本与火炬 -->
  <g transform="translate(100, 100)">
    <!-- 书本 -->
    <rect x="-25" y="-15" width="50" height="30" fill="none" stroke="#c9a96e" stroke-width="2" rx="2"/>
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#c9a96e" stroke-width="1"/>
    
    <!-- 火焰 -->
    <path d="M0,-30 Q5,-35 0,-45 Q-5,-35 0,-30" fill="#c9a96e" opacity="0.8"/>
    <path d="M0,-25 Q3,-30 0,-38 Q-3,-30 0,-25" fill="#c9a96e"/>
  </g>
  
  <!-- 方位装饰线 -->
  <line x1="100" y1="5" x2="100" y2="15" stroke="#c9a96e" stroke-width="2" opacity="0.5"/>
  <line x1="100" y1="185" x2="100" y2="195" stroke="#c9a96e" stroke-width="2" opacity="0.5"/>
  <line x1="5" y1="100" x2="15" y2="100" stroke="#c9a96e" stroke-width="2" opacity="0.5"/>
  <line x1="185" y1="100" x2="195" y2="100" stroke="#c9a96e" stroke-width="2" opacity="0.5"/>
</svg>